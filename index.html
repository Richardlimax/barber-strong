<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BARBER STRONG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topo">
        <div class="logo-area">
    <img src="imagens/logo.png" alt="Barber Strong Logo">
</div>
        <nav>
            <a href="#servicos">Serviços</a>
            <a href="#sobre">Sobre</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

    <section class="banner">
    
    <div class="overlay"></div>

    <div class="conteudo-banner">
        <h2>Seu estilo começa aqui</h2>
        <p>Cortes modernos, barba e atendimento de alto nível</p>
        <a class="botao" href="#">Agendar horário</a>
    </div>

    <img class="banner-lateral" src="imagens/banner.jpg" alt="Barber Pole">

</section>

    <section id="servicos">
        <h2>Serviços</h2>
        <div class="cards">
            <div class="card">Corte Masculino</div>
            <div class="card">Barba</div>
            <div class="card">Combo Corte + Barba</div>
        </div>
    </section>

    <section id="sobre">
        <h2>Sobre</h2>
        <p>Na BARBER STRONG, entregamos estilo, precisão e atitude em cada detalhe.</p>
    </section>

    <section id="contato">
        <h2>Contato</h2>
        <p>WhatsApp: (11) 99999-9999</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
